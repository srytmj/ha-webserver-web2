<VirtualHost *:80>
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        AllowOverride All
        Require all granted
        Options -Indexes
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ha-webserver-error.log
    CustomLog ${APACHE_LOG_DIR}/ha-webserver-access.log combined
</VirtualHost>
